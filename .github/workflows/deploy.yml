name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cPanel Deployment
        run: |
          curl -s -o response.json -w "%{http_code}" \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://${{ secrets.CPANEL_DOMAIN }}:2083/execute/VersionControl/update?name=supraorigin" \
            > http_code.txt
          
          HTTP_CODE=$(cat http_code.txt)
          echo "HTTP Status: $HTTP_CODE"
          cat response.json
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Deployment failed!"
            exit 1
          fi
          echo "Deployment triggered successfully!"